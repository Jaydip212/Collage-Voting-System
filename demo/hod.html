<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>HOD Dashboard – College Voting System</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
<nav class="nav">
  <a class="nav-logo" href="index.html"><span class="ico">🏛️</span>HVD College Votes</a>
  <div class="nav-links">
    <div style="display:flex;align-items:center;gap:12px;margin-right:20px">
      <div id="uAvatar" style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#db2777,#6366f1);display:flex;align-items:center;justify-content:center;font-weight:700"></div>
      <div>
        <div id="uName" style="font-weight:600;font-size:.9rem;line-height:1.2"></div>
        <div id="uDept" style="font-size:.75rem;color:var(--muted)"></div>
      </div>
    </div>
    <button class="btn btn-sm btn-outline" onclick="logout()"><i class="fas fa-sign-out-alt"></i>Logout</button>
  </div>
</nav>

<div class="page" style="padding-top:100px">
  
  <div class="sec-hd">
    <div class="sec-title">📊 Departmental Election Reports</div>
  </div>

  <div id="hodContent" style="display:grid;grid-template-columns:1fr;gap:20px"></div>

</div>

<script src="app.js"></script>
<script>
const user = requireLogin('hod');
if(user){
  document.getElementById('uName').textContent = user.name;
  document.getElementById('uAvatar').textContent = initials(user.name);
  document.getElementById('uDept').textContent = 'HOD - ' + user.dept;
}

function loadDashboard() {
  const allE = getElections();
  
  // HOD sees elections for their dept, plus global
  const myElections = allE.filter(e => !e.deptId || e.deptId===user.deptId);

  const hc = document.getElementById('hodContent');
  if(!myElections.length) {
    hc.innerHTML = `<div class="glass-card" style="padding:40px;text-align:center;color:var(--muted)">No elections found for your department.</div>`;
    return;
  }

  hc.innerHTML = myElections.map(e => {
    const res = getResults(e.id);
    const total = getVoteCount(e.id);
    const winner = res.length ? res[0] : null;
    return `
    <div class="glass-card" style="padding:24px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;border-bottom:1px solid rgba(255,255,255,.1);padding-bottom:12px">
        <div>
          <h3 style="font-size:1.2rem;margin:0 0 4px">${e.title}</h3>
          <div style="font-size:.8rem;color:var(--muted)">${e.type.toUpperCase()} | ${e.status.toUpperCase()} | ${total} Votes Total</div>
        </div>
        <span class="badge ${e.status==='active'?'badge-active':e.status==='completed'?'badge-completed':'badge-upcoming'}">${e.status.toUpperCase()}</span>
      </div>

      ${e.status==='completed' && winner ? `
        <div style="background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);padding:12px;border-radius:8px;margin-bottom:16px;display:flex;align-items:center;gap:12px">
          <div style="font-size:2rem">🏆</div>
          <div><div style="font-size:.75rem;color:var(--success);text-transform:uppercase;letter-spacing:1px;font-weight:700">Winner</div><div style="font-weight:bold;font-size:1.1rem">${winner.name}</div></div>
        </div>
      ` : ''}

      <div style="display:grid;gap:12px">
        ${e.candidates.map(c => {
          const v = DB.getO('votes')[e.id]?.[c.id] || 0;
          const pct = total>0 ? Math.round((v/total)*100) : 0;
          return `
          <div>
            <div style="display:flex;justify-content:space-between;font-size:.85rem;margin-bottom:4px">
              <span>${c.name} <span style="color:var(--muted);font-size:.75rem">(${c.dept})</span></span>
              <span>${pct}% (${v} votes)</span>
            </div>
            <div class="prog"><div class="prog-fill" style="width:${pct}%;background:${e.status==='completed' && winner && c.id===winner.id?'var(--success)':'var(--info)'}"></div></div>
          </div>
          `;
        }).join('')}
      </div>
    </div>`;
  }).join('');
}

loadDashboard();
</script>
</body>
</html>
